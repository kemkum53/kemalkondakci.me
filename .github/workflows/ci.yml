name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# GHCR'ye (ghcr.io) image push edebilmek icin GITHUB_TOKEN'a pakete yazma izni.
# contents:read -> checkout icin yeterli.
permissions:
  contents: read
  packages: write

# Image adlarini tek yerde tut (GHCR adlari KUCUK HARF olmali).
env:
  IMAGE_API: ghcr.io/kemkum53/kemalkondakci.me-api
  IMAGE_FRONT: ghcr.io/kemkum53/kemalkondakci.me-front

jobs:
  # ============ Backend testleri (FastAPI / pytest) ============
  # Testler SQLite kullaniyor, gercek Postgres GEREKMEZ -> servis container yok.
  test-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api      # bu job'taki 'run' adimlari api/ icinde calissin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"        # Dockerfile ile ayni surum
          cache: pip
          cache-dependency-path: api/requirements-dev.txt

      - name: Bagimliliklari kur
        run: pip install -r requirements-dev.txt

      - name: Testleri calistir (pytest)
        run: pytest

  # ============ Frontend testleri (Next.js / vitest) ============
  test-front:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Bagimliliklari kur
        run: npm ci

      - name: Testleri calistir (vitest)
        run: npm run test

  # ============ api image build + GHCR push (test-api gecince) ============
  build-api:
    runs-on: ubuntu-latest
    needs: test-api                     # api testleri gecmeden build yok
    steps:
      - uses: actions/checkout@v4

      - name: GHCR'ye login ol
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}            # = kemkum53
          password: ${{ secrets.GITHUB_TOKEN }}    # Actions otomatik saglar

      # 1) Once SADECE build et ve runner'in yerel docker'ina yukle (push YOK).
      #    'load: true' -> image'i taranabilmesi icin daemon'a alir.
      - name: api image build (yerel, tarama icin)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          load: true
          push: false
          # buildx attestation index'ini kapat: 'load' edilen image tek temiz
          # manifest olur, sonraki 'docker push' "unknown blob" vermez.
          provenance: false
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}

      # 2) Trivy ile guvenlik taramasi.
      #    ignore-unfixed: duzeltmesi/yamasi olmayan CVE'lerle ugrasma.
      #    exit-code '1' -> ENFORCE: image temiz, artik HIGH/CRITICAL gate.
      - name: Guvenlik taramasi (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_API }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          # api temiz -> ENFORCE: HIGH/CRITICAL bulunursa job FAIL -> push/deploy olmaz.
          exit-code: '1'

      # 3) Tarama gecince (ve sadece main'de) GHCR'ye push et.
      - name: GHCR'ye push (sadece main)
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.IMAGE_API }}:latest
          docker push ${{ env.IMAGE_API }}:${{ github.sha }}

  # ============ front image build + GHCR push (test-front gecince) ============
  build-front:
    runs-on: ubuntu-latest
    needs: test-front
    steps:
      - uses: actions/checkout@v4

      - name: GHCR'ye login ol
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1) Build + yerel daemon'a yukle (push YOK).
      - name: front image build (yerel, tarama icin)
        uses: docker/build-push-action@v6
        with:
          context: ./front
          load: true
          push: false
          # Ayni nedenle: temiz tek-manifest -> 'docker push' guvenli.
          provenance: false
          tags: |
            ${{ env.IMAGE_FRONT }}:latest
            ${{ env.IMAGE_FRONT }}:${{ github.sha }}

      # 2) Trivy taramasi (HIGH/CRITICAL -> gate).
      - name: Guvenlik taramasi (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_FRONT }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          # OS yamandi + npm runtime'dan silindi -> ENFORCE.
          exit-code: '1'

      # 3) Tarama gecince (sadece main) GHCR'ye push.
      - name: GHCR'ye push (sadece main)
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.IMAGE_FRONT }}:latest
          docker push ${{ env.IMAGE_FRONT }}:${{ github.sha }}

  # ============ Sunucuya deploy (sadece main push'ta) ============
  # Iki image de GHCR'ye gittikten SONRA sunucuya SSH ile baglanir,
  # yeni image'lari ceker ve compose ile yeniden baslatir.
  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-front]
    if: github.ref == 'refs/heads/main'    # PR'larda deploy YOK
    steps:
      - name: Sunucuya SSH + guncelle
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}        # sunucu IP veya domain
          username: ${{ secrets.SERVER_USER }}    # ssh kullanici adi
          key: ${{ secrets.SSH_PRIVATE_KEY }}     # deploy private key
          script: |
            set -e
            cd ${{ secrets.SERVER_PATH }}         # compose dosyasinin oldugu klasor
            docker compose pull                   # GHCR'den yeni image'lari cek
            docker compose up -d                  # degisen servisleri yeniden baslat
            docker image prune -f                 # eski/danglig image'lari temizle
