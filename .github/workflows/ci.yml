name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# GHCR'ye (ghcr.io) image push edebilmek icin GITHUB_TOKEN'a pakete yazma izni.
# contents:read -> checkout icin yeterli.
permissions:
  contents: read
  packages: write

# Image adlarini tek yerde tut (GHCR adlari KUCUK HARF olmali).
env:
  IMAGE_API: ghcr.io/kemkum53/kemalkondakci.me-api
  IMAGE_FRONT: ghcr.io/kemkum53/kemalkondakci.me-front

jobs:
  # ============ Backend testleri (FastAPI / pytest) ============
  # Testler SQLite kullaniyor, gercek Postgres GEREKMEZ -> servis container yok.
  test-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api      # bu job'taki 'run' adimlari api/ icinde calissin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"        # Dockerfile ile ayni surum
          cache: pip
          cache-dependency-path: api/requirements-dev.txt

      - name: Bagimliliklari kur
        run: pip install -r requirements-dev.txt

      - name: Testleri calistir (pytest)
        run: pytest

  # ============ Frontend testleri (Next.js / vitest) ============
  test-front:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Bagimliliklari kur
        run: npm ci

      - name: Testleri calistir (vitest)
        run: npm run test

  # ============ api image build + GHCR push (test-api gecince) ============
  build-api:
    runs-on: ubuntu-latest
    needs: test-api                     # api testleri gecmeden build yok
    steps:
      - uses: actions/checkout@v4

      - name: GHCR'ye login ol
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}            # = kemkum53
          password: ${{ secrets.GITHUB_TOKEN }}    # Actions otomatik saglar

      - name: api image build + push
        uses: docker/build-push-action@v6
        with:
          context: ./api
          # PR'larda SADECE build (push yok); sadece main'e push'ta GHCR'ye yolla.
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}

  # ============ front image build + GHCR push (test-front gecince) ============
  build-front:
    runs-on: ubuntu-latest
    needs: test-front
    steps:
      - uses: actions/checkout@v4

      - name: GHCR'ye login ol
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: front image build + push
        uses: docker/build-push-action@v6
        with:
          context: ./front
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_FRONT }}:latest
            ${{ env.IMAGE_FRONT }}:${{ github.sha }}

  # ============ Sunucuya deploy (sadece main push'ta) ============
  # Iki image de GHCR'ye gittikten SONRA sunucuya SSH ile baglanir,
  # yeni image'lari ceker ve compose ile yeniden baslatir.
  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-front]
    if: github.ref == 'refs/heads/main'    # PR'larda deploy YOK
    steps:
      - name: Sunucuya SSH + guncelle
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}        # sunucu IP veya domain
          username: ${{ secrets.SERVER_USER }}    # ssh kullanici adi
          key: ${{ secrets.SSH_PRIVATE_KEY }}     # deploy private key
          script: |
            set -e
            cd ${{ secrets.SERVER_PATH }}         # compose dosyasinin oldugu klasor
            docker compose pull                   # GHCR'den yeni image'lari cek
            docker compose up -d                  # degisen servisleri yeniden baslat
            docker image prune -f                 # eski/danglig image'lari temizle
